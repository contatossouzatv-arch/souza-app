services:
  postgres:
    image: postgres:16
    container_name: app-souza-cass-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: app_souza_cass
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: app-souza-cass-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
