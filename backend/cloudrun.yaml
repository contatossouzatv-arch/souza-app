apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: souza-cass-api
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        # 0 instâncias quando sem tráfego — economiza custo; cold start leva ~10-20s
        autoscaling.knative.dev/minScale: "0"
        # Limita instâncias para não estourar o pool do Cloud SQL
        # 4 instâncias × DB_POOL_MAX=20 = 80 conexões máximas
        autoscaling.knative.dev/maxScale: "4"
        # Quantas requisições simultâneas por instância antes de escalar
        # Valor baixo = escala mais rápido mas custa mais; 40 é equilibrado
        autoscaling.knative.dev/target: "40"
        # CPU sempre alocada (não apenas durante request) — elimina cold start de CPU
        run.googleapis.com/cpu-throttling: "false"
        # CPU extra durante o startup para reduzir latência do cold start
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 60
      containers:
        - image: gcr.io/SEU_PROJECT_ID/souza-cass-api:latest
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
            requests:
              cpu: 250m
              memory: 256Mi
          env:
            - name: NODE_ENV
              value: production
            - name: DB_POOL_MAX
              value: "20"
            - name: DB_IDLE_TIMEOUT_MS
              value: "10000"
            - name: DB_CONNECTION_TIMEOUT_MS
              value: "15000"
          # Startup probe: aguarda até 120s para o DB conectar antes de aceitar tráfego
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 12
            timeoutSeconds: 5
          # Liveness probe: reinicia a instância se o DB ficar inacessível por 90s
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
